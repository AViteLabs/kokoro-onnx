name: test

on:
  workflow_dispatch:

jobs:
  test:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"

    runs-on: ${{ matrix.platform }}
    env:
      UV_CONSTRAINT: constraints-py314.txt
    steps:
      - uses: actions/checkout@v4
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v5

      - name: test
        run: |
          echo '=== constraints ==='
          cat constraints-py314.txt
          wget --progress=bar:force:noscroll https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.int8.onnx -O kokoro-v1.0.onnx
          wget --progress=bar:force:noscroll https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin -O voices-v1.0.bin
          uv run python --version
          uv tree
          uv pip freeze | grep -E 'rdflib|csvw|segments|phonemizer' || true
          uv run python -c "import rdflib; print('rdflib', rdflib.__version__)"
          uv run python -c "import csvw; print('csvw', getattr(csvw, '__version__', 'unknown'))"
          uv run python -c "import segments; print('segments', getattr(segments, '__version__', 'unknown'))"
          uv run python -c "import phonemizer; print('phonemizer', getattr(phonemizer, '__version__', 'unknown'))"
          uv run examples/save.py
        shell: bash
