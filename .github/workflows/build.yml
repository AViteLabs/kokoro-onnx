name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pyproject.toml
      - uv.lock
      - kokoro_onnx/**
      - .github/workflows/build.yml

permissions:
  contents: read

jobs:
  build:
    name: Build package on Python 3.14
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Show tool versions
        run: |
          uv --version
          uv run --python 3.14 python --version

      - name: Sync package environment
        run: uv sync --python 3.14 --dev

      - name: Build source and wheel distributions
        run: uv build
